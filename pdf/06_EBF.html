## Wirkungsevaluation
### Literaturauszug: Treischl &amp; Wolbring (2020: Kapitel 2):

&lt;p style="font-size:120%;"&gt;“Bei Evaluationen geht es um den Wert einer Sache bzw. genauer um dessen Bestimmung, wobei das zu bewertende Objekt als Evaluationsgegenstand (Evaluandum) bezeichnet wird.”&lt;/p&gt; 

&lt;p style="font-size:120%;"&gt;“Gegenstand einer Evaluation können dabei Produkte, Prozesse, Veranstaltungen, Interventionen oder ganze Maßnahmenbündel sein, die mehr oder weniger systematisch bewertet werden.”&lt;/p&gt; 



---
class: middle, center

&lt;p style="font-size:120%;"&gt;“Wie Kromey (2001, S. 106) erläutert, meint Evaluation im alltagssprachlichen Sinne jedwede Form der mehr oder weniger systematischen Beurteilung:”&lt;/p&gt; 


&lt;p style="font-size:120%;"&gt;“Irgend etwas wird von irgend jemandem nach irgendwelchen Kriterien in irgendeiner Weise bewertet. Derselbe Sachverhalt kann – wie die Alltagserfahrung – von verschiedenen Individuen sehr unterschiedlich bis gegensätzlich eingeschätzt und beurteilt werden (Kromey 2001, S. 106).”&lt;/p&gt;

## Etwas formaler (1):

### - Sei D eine Dummy-Variable (d.h. eine binär kodierte Variable), welche das Auftreten bzw. Wegbleiben eines Stimulus (Ursache) anzeigt.

### - Der kausale Effekt δ ist definiert als Differenz zwischen Y¹, dem Zustand der Zielvariable Y nach Auftreten (D = 1) der Ursache, und Y°, dem Zustand der Zielvariable ohne Auftreten (D = 0) der Ursache

### - δ = Y¹ - Y°


---
class: middle, center

## Etwas formaler (2):

### - Eine Person kann nicht gleichzeitig ein Treatment bekommen und in der Kontrollgruppe sein.

### - Ergo: Messung von Kausalität auf der Mikroebene des Individuums ist damit selbst im Experiment ausgeschlossen.

### - Problem: Wir sind auf der Suche nach einer kontrafaktischen Annäherungen eines (unbeobachtes) Ergebnisses: Welchen Schulerfolg hätte Person i gehabt, wenn die Person die Klasse B anstelle der Klasse A besucht hätte?

# 3. Experimentelle Bildungsforschung

- Zufallsbedingte Aufteilung (Randomisierung) auf Kontroll- und Versuchsgruppe (Treatment)

- Zufällige Aufteilung auf beide Gruppen kontrolliert für alle Drittvariablen (Compare Like with Like)

- Manipulation: Vermutete Ursache (= Stimulus) in der Versuchsgruppe

- Manipulation: Keine Ursache (= kein Stimulus) in der Kontrollgruppe

- Werte in der Versuchsgruppe die über der Schwelle der Zufallsvarianz (t-Test) liegen werden auf den Stimulus zurückgeführt und als kausaler Effekt interpretiert.

## Quasi-experimentelles Design

- Zuordnung auf Kontroll- und Versuchsgruppe erfolgt nicht durch Randomisierung

- Quasi-Experimente: Stimulus wird gegeben, Zuordnung erfolgt selbst durch die Forschungsobjekte

- Evaluationsforschung basiert oftmals auf quasi-experimenteller Versuchsanordnungen (Probleme?)

- Notation Quasi-Experiment:


| Zuweisung |         X          | Messung `\(t_1\)` |
|-----------|--------------------|---------------|
|           |   Kontrollgruppe   |       O       |
|           |   Versuchsgruppe   |       O       |



&gt; “Experiments in the social sciences? What should we and what should we not do. The Little-Albert-Experiment.”



---
## Kaum experimentelle Forschungsdesigns in der EBF

### Häufige Bedenken von Stakeholdern:

1. Experimente sind häufig nicht ethisch vertretbar.

2. Experimente sind nicht praktisch umsetzbar sind.

3. Experimente sind künstlich aufgrund der Künstlichkeit des Settings.

4. Experimente basieren auf einer geringen Fallzahl und die Ergebnisse sind nicht auf andere Kontexte übertragbar.


---
## Einwände zum Teil nicht zutreffend, weil:

1. Ethikboard müssen Verstöße gegen ethische Einwände einlegen.

2. Experimente sind auch in der Bildungsforschung möglich.

3. Künstlichkeit betrifft in erster Instanz Laborexperimente.

4. Geringe Fallzahl ist kein allgemeines Problem experimenteller Forschung.

class: middle, center

&lt;p style="font-size:120%;"&gt;Statt dessen müssen wir uns über die interne und die externe Validität unserer Evaluationsbefunde Gedanken machen! Keine Ahnung was interne oder externe Validität ist? 🧐 Ein kurzer Auszug aus der Literatur zur Vertiefung (Treischl &amp; Wolbring 2020, Kapitel: 6).&lt;/p&gt; 

&lt;p style="font-size:120%;"&gt;“Der Begriff der internen Validität zielt darauf ab, inwiefern ein Effekt tatsächlich kausal auf das Treatment zurückführbar ist.”&lt;/p&gt; 

&lt;p style="font-size:120%;"&gt;“Anders ausgedrückt, bemisst die interne Validität damit, inwieweit mögliche Störfaktoren durch das gewählte Forschungsdesign ausgeschlossen werden oder ob nicht doch alternative Erklärungen einen Befund hervorgebracht haben könnten.”&lt;/p&gt; 


---
class: middle, center

&lt;p style="font-size:120%;"&gt;“Im Kern beziehen sich Fragen nach der internen Validität also auf die Belastbarkeit von Wirkungsaussagen im Zuge einer Evaluation.”&lt;/p&gt; 

&lt;p style="font-size:120%;"&gt;“Neben Fragen der internen Validität stellt sich auch bei Evaluationen die Frage nach der Generalisierbarkeit, also der externen Validität empirischer Befunde. Dabei gilt es vier Dimensionen der Generalisierbarkeit zu berücksichtigen.”&lt;/p&gt;
